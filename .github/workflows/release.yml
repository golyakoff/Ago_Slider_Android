name: Build and Publish Release APK

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > ${{ runner.temp }}/keystore.jks

      - name: Build Signed APK
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=${{ runner.temp }}/keystore.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Read Changelog for current version
        id: changelog
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          CHANGELOG_FILE="CHANGELOG.md"

          if [ ! -f "$CHANGELOG_FILE" ]; then
            echo "content=Changelog file not found." >> $GITHUB_OUTPUT
            exit 0
          fi

          BLOCK=$(awk -v ver="$VERSION" '
            BEGIN { found=0; output="" }
            /^# Release / {
              if (found) exit
              if (index($0, ver) > 0) { found=1; next }
            }
            found { output = output $0 "\n" }
            END { print output }
          ' "$CHANGELOG_FILE")

          BLOCK=$(echo "$BLOCK" | sed -e '/^[[:space:]]*$/d' -e '1{/^$/d}' -e '${/^$/d}')

          if [ -z "$BLOCK" ]; then
            BLOCK="No changelog section found for version $VERSION."
          fi

          echo 'content<<EOF' >> $GITHUB_OUTPUT
          echo "$BLOCK" >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT

      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v3
        with:
          files: app/build/outputs/apk/release/*.apk
          body: ${{ steps.changelog.outputs.content }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}